name: Workflow 2 - Multi Platform

on:
  pull_request:
    branches:
      - main

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show OS info
        run: uname -a
      - name: Create file
        run: |
          echo "Hello from Ubuntu" > ubuntu.txt
          cat ubuntu.txt

  windows-job:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show OS info
        run: systeminfo
      - name: Create file
        run: |
          echo Hello from Windows > windows.txt
          type windows.txt

  macos-job:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show OS info
        run: uname -a
      - name: Create file
        run: |
          echo "Hello from macOS" > mac.txt
          cat mac.txt
